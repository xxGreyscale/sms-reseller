spring:
  flyway:
    enabled: true      # Run Flyway migrations — creates admin schema + tables in Testcontainers DB
    schemas: admin     # Must match production config; Flyway creates the schema if missing
    create-schemas: true
  jpa:
    hibernate:
      ddl-auto: validate   # Validate against Flyway-created schema (not create-drop — no admin schema exists otherwise)
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:test-keys/jwt-public.pem

logging:
  level:
    com.opendesk: DEBUG
    org.springframework.security: WARN
    org.springframework.amqp: WARN
