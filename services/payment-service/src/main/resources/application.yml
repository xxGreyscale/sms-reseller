spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  profiles:
    group:
      dev: stub
      staging: stub
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/jwt-public.pem

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  payment:
    timeout-seconds: 120       # D-06: 2-minute STK-push timeout
    stub:
      default-outcome: SUCCESS # StubPaymentGateway default (SUCCESS | FAILURE | TIMEOUT)
      delay-ms: 500            # Simulated callback delay for stub
  reconciliation:
    fixed-delay-ms: 120000     # ReconciliationJob interval — 2 minutes
