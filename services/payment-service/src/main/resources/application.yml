spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  profiles:
    group:
      dev: stub
      staging: stub
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/jwt-public.pem

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  payment:
    timeout-seconds: 120       # D-06: 2-minute STK-push timeout
    timeout-sweep-ms: 30000    # PaymentTimeoutJob sweep interval (30s)
    timeout-max-per-run: 100   # Max PENDING payments expired per sweep
    stub:
      default-outcome: SUCCESS # StubPaymentGateway default (SUCCESS | FAILURE | TIMEOUT)
      delay-ms: 500            # Simulated callback delay for stub
  reconciliation:
    fixed-delay-ms: 120000     # ReconciliationJob interval — 2 minutes
    max-per-run: 50            # Max stale payments checked per reconciliation run
  # Azampay prod credentials — injected via K8s Secrets in prod (D-10, CLAUDE.md)
  azampay:
    base-url: ${AZAMPAY_BASE_URL:https://sandbox.azampay.co.tz}
    app-name: ${AZAMPAY_APP_NAME:sms-reseller}
    client-id: ${AZAMPAY_CLIENT_ID:placeholder}
    client-secret: ${AZAMPAY_CLIENT_SECRET:placeholder}

resilience4j:
  circuitbreaker:
    instances:
      azampay:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      azampay:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
