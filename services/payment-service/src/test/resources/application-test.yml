spring:
  flyway:
    enabled: false   # Testcontainers DB; schema managed via ddl-auto=create-drop
  jpa:
    hibernate:
      ddl-auto: create-drop   # Test DB lifecycle managed by Testcontainers
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:test-keys/jwt-public.pem

app:
  payment:
    timeout-seconds: 120
    stub:
      default-outcome: SUCCESS
      delay-ms: 0              # Instant in tests — no simulated delay
  reconciliation:
    fixed-delay-ms: 120000

logging:
  level:
    com.opendesk: DEBUG
    org.springframework.security: WARN
