spring:
  flyway:
    enabled: true    # Flyway manages schema in tests — runs V1/V2/V3 seed migrations against Testcontainers PG
  jpa:
    hibernate:
      ddl-auto: none   # Flyway owns the schema; JPA must NOT recreate tables
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:test-keys/jwt-public.pem

app:
  payment:
    timeout-seconds: 120
    stub:
      default-outcome: SUCCESS
      delay-ms: 0              # Instant in tests — no simulated delay
  reconciliation:
    fixed-delay-ms: 120000

logging:
  level:
    com.smsreseller: DEBUG
    org.springframework.security: WARN
