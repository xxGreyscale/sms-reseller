spring:
  application:
    name: wallet-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  profiles:
    group:
      dev: stub
      staging: stub
  # Placeholder config keys — real values injected via K8s Secrets in prod
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/jwt-public.pem

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  wallet:
    low-credit-threshold: 20          # D-08: alert when available credits fall below this value
    low-credit-alert-delay-ms: 300000 # LowCreditAlertJob interval — 5 minutes
    expiry-warning-cron: "0 0 8 * * ?" # ExpiryWarningJob — daily at 08:00 UTC
    expiry-sweep-cron: "0 0 2 * * ?"   # ExpirySweepJob — daily at 02:00 UTC
