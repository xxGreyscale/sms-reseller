spring:
  application:
    name: identity-service
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    placeholder-replacement: true
    placeholders:
      adminEmail: ${ADMIN_EMAIL:admin@sms-reseller.app}
      adminPasswordHash: ${ADMIN_PASSWORD_HASH:{bcrypt}$2a$10$PLACEHOLDER_REPLACE_IN_PROD}
  profiles:
    group:
      dev: stub
      staging: stub

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# Placeholder config keys — real values injected via K8s Secrets in prod
app:
  jwt:
    private-key-location: classpath:keys/jwt-private.pem
    public-key-location: classpath:keys/jwt-public.pem
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
    admin-token-ttl-minutes: 60
  nida:
    stub:
      default-outcome: SUCCESS
      auto-verify-delay-ms: 3000
  lockout:
    max-attempts: 5
    cooldown-minutes: 15
