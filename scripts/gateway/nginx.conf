# Local-dev API gateway.
#
# Production uses Traefik on the edge to route /api/v1/* by path to each service.
# This nginx config replicates that path-based fan-out for local development, where
# the 8 Spring Boot services run on the HOST (via gradlew bootRun) while this gateway
# runs in a container. Upstreams are reached via host.docker.internal.
#
# admin-web targets http://localhost:8080 (BACKEND_URL), which maps to this gateway.
#
# nginx prefix locations use longest-prefix matching, so the most specific path wins
# regardless of declaration order.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Host where the Spring Boot services run (Docker Desktop + Linux via extra_hosts).
    # Service ports: identity 8081, catalog 8082, wallet 8083, payment 8084,
    #                contact 8085, messaging 8086, notification 8087, admin 8088.

    server {
        listen 8080;

        # Forwarded request headers (Authorization is forwarded by default).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # --- identity (8081) ---
        location /api/v1/auth/        { proxy_pass http://host.docker.internal:8081; }
        location /api/v1/admin/users  { proxy_pass http://host.docker.internal:8081; }

        # --- wallet (8083) ---
        location /api/v1/wallet                 { proxy_pass http://host.docker.internal:8083; }
        location /api/v1/admin/ledger           { proxy_pass http://host.docker.internal:8083; }
        location /api/v1/analytics/credit-usage { proxy_pass http://host.docker.internal:8083; }

        # --- payment (8084) ---
        location /api/v1/payments      { proxy_pass http://host.docker.internal:8084; }
        location /api/v1/bundles       { proxy_pass http://host.docker.internal:8084; }
        location /api/v1/admin/bundles { proxy_pass http://host.docker.internal:8084; }

        # --- contact (8085) ---
        location /api/v1/contacts          { proxy_pass http://host.docker.internal:8085; }
        location /api/v1/groups            { proxy_pass http://host.docker.internal:8085; }
        location /api/v1/internal/contacts { proxy_pass http://host.docker.internal:8085; }
        location /api/v1/suppression       { proxy_pass http://host.docker.internal:8085; }

        # --- messaging (8086) ---
        location /api/v1/campaigns            { proxy_pass http://host.docker.internal:8086; }
        location /api/v1/sender-ids           { proxy_pass http://host.docker.internal:8086; }
        location /api/v1/internal/sender-ids  { proxy_pass http://host.docker.internal:8086; }
        location /api/v1/messaging            { proxy_pass http://host.docker.internal:8086; }
        location /api/v1/analytics/campaigns  { proxy_pass http://host.docker.internal:8086; }

        # --- notification (8087) ---
        location /api/v1/notifications { proxy_pass http://host.docker.internal:8087; }

        # --- admin (8088) ---
        location /api/v1/admin/audit { proxy_pass http://host.docker.internal:8088; }

        # Health endpoint for the gateway itself.
        location = /gateway/health {
            add_header Content-Type application/json;
            return 200 '{"status":"UP"}';
        }

        # Unmatched API paths -> explicit 404 (makes misroutes visible).
        location /api/ {
            return 404 '{"error":"no gateway route for this path"}';
        }
    }
}
