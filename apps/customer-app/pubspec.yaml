name: customer_app
description: Open Desk SMS Reseller - Customer Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  dio: ^5.9.2
  go_router: ^17.3.0
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
